                </div>
            </div>
            </div>
            <div style = "background-color: blue; height : 200px;"> div2 </div>
            <div style = "background-color: pink; height : 200px;"> div3 </div>
            <div style = "background-color: blue; height : 200px;"> div1</div>
            <div style = "background-color: pink; height : 200px;"> div2</div>
            <div style = "background-color: blue; height : 200px;"> div3</div>
        </div>

</html>
