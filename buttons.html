<style>
    .subscribe-button {
        background-color:rgb(236, 29, 29);
        color:white;
        border:none;
        padding-right:10px;
        padding-left:10px;
        padding-top:8px;
        padding-bottom:8px;
        border-radius:5px;
        cursor:pointer;
        transition :opacity 1s;
    }
    .subscribe-button:hover {
        opacity:0.8;
    }
    .subscribe-button:active {
        opacity:0.5;
    }
    .join-button {
        background-color:rgb(255, 255, 255);
        color:black;
        border-color:rgb(32, 32, 184);
        border-width:2px;
        height:36px;
        width:55px;
        border-style:solid;
        border-radius:2px;
        cursor:pointer;
        margin-left:8px;
        transition: background-color 0.5s, color 1s;
    }
    .join-button:hover {
        background-color:rgb(5, 127, 241);
        color:white;
    }
    .join-button:active {
        opacity:0.7;
    }
    .tweet-button {
        background-color:rgb(0, 195, 255);
        color:white;
        border:none;
        border-radius:20px;
        height:30px;
        width:74px;
        font-size :15px;
        font-weight:bold;
        cursor:pointer;
        margin-left:8px;
        box-shadow:10px 10px 5px rgba(19, 1, 1, 0.15);
        transition :box-shadow 0.5s;
    }
    .tweet-button:hover {
        box-shadow:10px 10px 5px rgba(19, 1, 1, 0.3);
        opacity:0.8;
    }
</style>
<button class="subscribe-button"> 
    SUBSCRIBE
</button>
<button class="join-button"> 
    JOIN
</button>
<button class="tweet-button">
    TWEET
</button>
